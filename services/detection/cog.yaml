# Replicate Cog config — serverless GPU inference.
# Build:   cog build -t homingo-detection
# Push:    cog login && cog push r8.im/<user>/homingo-detection
# Predict: cog predict -i image=@/path/to/plan.png -i kind=floor_plan

build:
  gpu: true
  cuda: "12.1"
  python_version: "3.11"
  system_packages:
    - "libgl1"
    - "libglib2.0-0"
    - "libsm6"
    - "libxext6"
    - "libxrender1"
  python_packages:
    - "fastapi==0.115.4"
    - "pydantic==2.9.2"
    - "ultralytics==8.3.30"
    - "paddleocr==2.8.1"
    - "paddlepaddle-gpu==2.6.2"
    - "numpy==1.26.4"
    - "opencv-python-headless==4.10.0.84"
    - "pillow==11.0.0"
    - "scikit-image==0.24.0"
    - "shapely==2.0.6"
    - "httpx==0.27.2"
    - "structlog==24.4.0"
    - "torch==2.4.1"
    - "torchvision==0.19.1"
  run:
    - "pip install --no-deps git+https://github.com/facebookresearch/segment-anything.git"

predict: "predict.py:Predictor"
